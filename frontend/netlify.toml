[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Redirige /api/* a las Netlify Functions en producción
[[redirects]]
  from = "/api/:function"
  to = "/.netlify/functions/:function"
  status = 200

# SPA fallback — siempre al final
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
